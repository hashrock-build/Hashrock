<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpolygon points='8,1 3,6 8,15' fill='%238fe4f5'/%3E%3Cpolygon points='8,1 13,6 8,15' fill='%233aa6d8'/%3E%3C/svg%3E" />
  <title>HASHROCK</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
    #game { position: fixed; inset: 0; }

    .panel {
      background: rgba(20,18,30,.82); color: #ece9ff; border: 1px solid #34304e; border-radius: 12px;
      padding: 9px 11px; font-size: 13px; backdrop-filter: blur(8px);
    }
    b { font-variant-numeric: tabular-nums; color: #ffd23f; }

    button {
      cursor: pointer; border: none; border-radius: 9px; padding: 8px 13px; font-weight: 700; font-size: 12px;
      color: #1a1330; background: linear-gradient(180deg, #ffd676, #eaa520); white-space: nowrap;
    }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    button.ghost { background: linear-gradient(180deg, #4a4668, #322e4c); color: #ece9ff; }
    button.mini { padding: 5px 9px; font-size: 11px; }

    /* top-left column: stats + log */
    #left { position: fixed; top: 12px; left: 12px; display: flex; flex-direction: column; gap: 8px; width: 230px; }
    /* top-right column: wallet / profile */
    #right { position: fixed; top: 12px; right: 12px; display: flex; flex-direction: column; gap: 8px; width: 220px; align-items: flex-end; }
    #right .panel, #right button { width: 100%; }
    #profile input { width: 100%; padding: 5px 8px; border-radius: 7px; border: 1px solid #34304e;
                     background: #1a1730; color: #ece9ff; font-size: 11px; margin: 3px 0; font-family: ui-monospace, monospace; }
    #profile .mono { font-family: ui-monospace, monospace; font-size: 10px; color: #9a92c0; word-break: break-all; margin: 2px 0; }
    #profile button { margin-top: 4px; }
    #profile .inv { display: flex; flex-direction: column; gap: 2px; font-size: 11px; margin: 2px 0; }
    #profile .invrow { display: flex; justify-content: space-between; color: #cfc8e8; }
    #profile .invrow span { color: #cda6f0; }
    #wallet { background: linear-gradient(180deg, #a98bff, #6f4fd0); color: #fff; }
    #profile.hidden, #wallet.hidden { display: none; }
    #profile .phead { font-weight: 700; margin-bottom: 4px; }
    .prow { display: flex; justify-content: space-between; gap: 8px; margin: 2px 0; }
    .dim { color: #9a92c0; } .dim b { color: #cda6f0; }
    /* live event feed (comment-style, newest at bottom, rises upward) */
    #feed { position: fixed; left: 14px; bottom: 54px; width: 300px; display: flex; flex-direction: column;
            justify-content: flex-end; gap: 3px; pointer-events: none; font-family: ui-monospace, monospace; font-size: 12px; }
    #feed .e { width: fit-content; max-width: 100%; padding: 4px 9px; border-radius: 8px;
               background: rgba(20,18,30,.72); border: 1px solid #34304e; color: #cfc8e8;
               animation: feedin .25s ease; }
    #feed .spawn { color: #8fe4f5; } #feed .mine { color: #8ef5a8; } #feed .evict { color: #f59a8f; }
    @keyframes feedin { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    /* top-center: coins mined */
    #center { position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
              display: flex; align-items: center; gap: 8px; font-size: 18px; }
    #center .clabel { color: #cfc8e8; font-size: 13px; }
    #center b { font-size: 22px; }

    /* bottom: actions */
    #actions { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; }

    #tip { position: fixed; bottom: 16px; left: 14px; color: #cfc8e8; font-size: 11px;
           background: rgba(20,18,30,.7); padding: 5px 9px; border-radius: 8px; border: 1px solid #34304e; }
    #tip kbd { background: rgba(255,255,255,.12); padding: 1px 5px; border-radius: 4px; font-family: ui-monospace, monospace; }
    #toast { position: fixed; bottom: 64px; left: 50%; transform: translateX(-50%); background: rgba(20,18,30,.92);
             color: #ece9ff; padding: 8px 14px; border-radius: 10px; border: 1px solid #34304e; font-size: 12px;
             opacity: 0; transition: opacity .2s; pointer-events: none; }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="game"></div>

  <div id="left">
    <div id="stats" class="panel">
      <div class="prow">🏦 Treasury <b id="treasury">0</b></div>
      <div class="prow dim">active ore <b id="count">0/150</b></div>
    </div>
  </div>

  <div id="right">
    <button id="wallet">🔗 Connect Wallet</button>
    <div id="profile" class="panel hidden">
      <div class="phead">👤 Profile</div>
      <input id="usernameinput" placeholder="set a username" spellcheck="false" maxlength="16" />
      <button id="savename" class="ghost mini">Save username</button>

      <div class="prow" style="margin-top:8px">🪙 coins <b id="pcoins">0</b></div>
      <div class="prow">💎 $HASHROCK <b id="phashrock">0</b></div>
      <div class="prow dim">wallet</div>
      <div id="pwallet" class="mono">not connected</div>

      <div class="prow dim" style="margin-top:8px">inventory</div>
      <div class="inv">
        <div class="invrow">🧍 Character <span id="invchar">Rookie</span></div>
        <div class="invrow">⛏ Axe <span id="invaxe">Wooden · Lv 1</span></div>
      </div>

      <button id="redeembtn" style="margin-top:8px">💱 Request Redeem</button>
      <button id="disconnect" class="ghost mini">Disconnect</button>
    </div>
  </div>

  <div id="center" class="panel"><span class="clabel">⛏ coins mined</span> <b id="coins">0</b></div>

  <div id="actions">
    <button id="upgrade" class="ghost">⚒ Upgrade</button>
    <button id="marketplace" class="ghost">🛒 Marketplace</button>
    <button id="otc" class="ghost">🤝 OTC Market</button>
  </div>

  <div id="feed"></div>

  <div id="tip"><kbd>WASD</kbd> move · press <kbd>Space</kbd> to mine</div>
  <div id="toast"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
