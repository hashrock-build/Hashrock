<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpolygon points='8,1 3,6 8,15' fill='%238fe4f5'/%3E%3Cpolygon points='8,1 13,6 8,15' fill='%233aa6d8'/%3E%3C/svg%3E" />
  <title>HASHROCK — Top-Down Mining Starter</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
    #game { position: fixed; inset: 0; }
    #hud {
      position: fixed; top: 12px; left: 12px; display: flex; gap: 10px; align-items: center;
      background: rgba(20,18,30,.82); color: #ece9ff; border: 1px solid #34304e; border-radius: 12px;
      padding: 9px 13px; font-size: 13px; backdrop-filter: blur(8px);
    }
    #hud b { font-variant-numeric: tabular-nums; color: #ffd23f; }
    #hud .dim { color: #9a92c0; } #hud .dim b { color: #cda6f0; }
    #hud .sep { width: 1px; align-self: stretch; background: #34304e; }
    #hud button {
      cursor: pointer; border: none; border-radius: 9px; padding: 7px 13px; font-weight: 700; font-size: 12px;
      color: #1a1330; background: linear-gradient(180deg, #ffd676, #eaa520);
    }
    #hud button#upgrade { background: linear-gradient(180deg, #c9a6f5, #8a5fd0); color: #1a1330; }
    #hud button:active { transform: translateY(1px); }
    #hud button:disabled { opacity: .45; cursor: not-allowed; }
    #hash { font-family: ui-monospace, monospace; font-size: 11px; color: #9a92c0; }
    #tip {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(20,18,30,.82); color: #cfc8e8; font-size: 12px; padding: 7px 14px; border-radius: 999px;
      border: 1px solid #34304e;
    }
    #tip kbd { background: rgba(255,255,255,.12); padding: 1px 5px; border-radius: 4px; font-family: ui-monospace, monospace; font-size: 11px; }
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="hud">
    <button id="spawn">+ Block</button>
    <button id="upgrade" title="Demo sink: 95% → pool, 5% → creator">⚒ Upgrade</button>
    <span class="sep"></span>
    <span title="Your in-game coins (backed 1:1 by $HASHROCK)">🪙 <b id="coins">0</b></span>
    <span title="Reward Pool — funds mining payouts (95% of sinks)" class="dim">⛏ pool <b id="pool">0</b></span>
    <span title="Treasury — $HASHROCK backing every coin 1:1" class="dim">🏦 treas <b id="treasury">0</b></span>
    <span title="Creator revenue — 5% of sinks" class="dim">👑 creator <b id="creator">0</b></span>
    <span class="sep"></span>
    <span>Ore: <b id="count">0/150</b></span>
    <span id="hash">—</span>
  </div>
  <div id="tip"><kbd>WASD</kbd>/<kbd>↑↓←→</kbd> move · <kbd>Space</kbd> mine nearest ore</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
