<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Cpolygon points='8,1 3,6 8,15' fill='%238fe4f5'/%3E%3Cpolygon points='8,1 13,6 8,15' fill='%233aa6d8'/%3E%3C/svg%3E" />
  <title>HASHROCK</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
    #game { position: fixed; inset: 0; }

    .panel {
      background: rgba(20,18,30,.82); color: #ece9ff; border: 1px solid #34304e; border-radius: 12px;
      padding: 9px 11px; font-size: 13px; backdrop-filter: blur(8px);
    }
    b { font-variant-numeric: tabular-nums; color: #ffd23f; }

    button {
      cursor: pointer; border: none; border-radius: 9px; padding: 8px 13px; font-weight: 700; font-size: 12px;
      color: #1a1330; background: linear-gradient(180deg, #ffd676, #eaa520); white-space: nowrap;
    }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    button.ghost { background: linear-gradient(180deg, #4a4668, #322e4c); color: #ece9ff; }
    button.mini { padding: 5px 9px; font-size: 11px; }

    /* top-left column: wallet / profile + stats + log */
    #left { position: fixed; top: 12px; left: 12px; display: flex; flex-direction: column; gap: 8px; width: 230px; }
    #wallet { background: linear-gradient(180deg, #a98bff, #6f4fd0); color: #fff; }
    #profile.hidden, #wallet.hidden { display: none; }
    #profile .phead { font-weight: 700; margin-bottom: 4px; }
    .prow { display: flex; justify-content: space-between; gap: 8px; margin: 2px 0; }
    .dim { color: #9a92c0; } .dim b { color: #cda6f0; }
    #stats #addspawn { margin: 6px 0; width: 100%; }
    #log { margin-top: 4px; display: flex; flex-direction: column; gap: 2px; font-size: 11px;
           font-family: ui-monospace, monospace; max-height: 150px; overflow: hidden; }
    #log .e { color: #cfc8e8; opacity: .95; }
    #log .spawn { color: #8fe4f5; } #log .mine { color: #8ef5a8; } #log .evict { color: #f59a8f; }

    /* top-center: coins mined */
    #center { position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
              display: flex; align-items: center; gap: 8px; font-size: 18px; }
    #center .clabel { color: #cfc8e8; font-size: 13px; }
    #center b { font-size: 22px; }

    /* bottom: actions */
    #actions { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; }

    #tip { position: fixed; bottom: 16px; left: 14px; color: #cfc8e8; font-size: 11px;
           background: rgba(20,18,30,.7); padding: 5px 9px; border-radius: 8px; border: 1px solid #34304e; }
    #tip kbd { background: rgba(255,255,255,.12); padding: 1px 5px; border-radius: 4px; font-family: ui-monospace, monospace; }
    #toast { position: fixed; bottom: 64px; left: 50%; transform: translateX(-50%); background: rgba(20,18,30,.92);
             color: #ece9ff; padding: 8px 14px; border-radius: 10px; border: 1px solid #34304e; font-size: 12px;
             opacity: 0; transition: opacity .2s; pointer-events: none; }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div id="game"></div>

  <div id="left">
    <button id="wallet">🔗 Connect Wallet</button>
    <div id="profile" class="panel hidden">
      <div class="phead">👤 Profile</div>
      <div class="prow">addr <b id="paddr">—</b></div>
      <div class="prow">coins <b id="pcoins">0</b></div>
      <button id="disconnect" class="ghost mini">Disconnect</button>
    </div>
    <div id="stats" class="panel">
      <div class="prow">🏦 Treasury <b id="treasury">0</b></div>
      <button id="addspawn" class="ghost mini">+ Spawn ore (dev)</button>
      <div class="prow dim">active <b id="count">0/150</b> · mined <b id="cmined">0</b> · unmined <b id="cunmined">0</b></div>
      <div id="log"></div>
    </div>
  </div>

  <div id="center" class="panel"><span class="clabel">⛏ coins mined</span> <b id="coins">0</b></div>

  <div id="actions">
    <button id="upgrade">⚒ Upgrade</button>
    <button id="marketplace" class="ghost">🛒 Marketplace</button>
    <button id="redeem" class="ghost">💱 Redeem</button>
    <button id="otc" class="ghost">🤝 OTC Market</button>
  </div>

  <div id="tip"><kbd>WASD</kbd> move · press <kbd>Space</kbd> to mine (stops if you move)</div>
  <div id="toast"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
