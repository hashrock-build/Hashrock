# HASHROCK production stack — single VPS (e.g. Contabo). Postgres + authoritative server + Caddy
# (serves the client + auto-TLS reverse-proxy). Configure ./.env (see .env.production.example),
# upload server/.treasury.json, point DNS, then:  docker compose up -d --build
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hashrock
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: hashrock
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hashrock -d hashrock"]
      interval: 10s
      timeout: 5s
      retries: 5
    # not published to the host — only the server container reaches it on the internal network

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Prefer an explicit DATABASE_URL from .env (REQUIRED if the password has URL-special chars
      # like @ : / — URL-encode them, e.g. @ → %40). Falls back to building it for simple passwords.
      DATABASE_URL: ${DATABASE_URL:-postgres://hashrock:${POSTGRES_PASSWORD}@db:5432/hashrock}
      PORT: 2567
      POOL_SEED: ${POOL_SEED:-50000}
      DAILY_EMISSION: ${DAILY_EMISSION:-0.10}
      ORE_PER_DAY: ${ORE_PER_DAY:-1440}
      REWARD_FLOOR: ${REWARD_FLOOR:-1}
      CREATOR_FEE: ${CREATOR_FEE:-0.05}
      ORE_HP: ${ORE_HP:-100}
      ORE_CAP: ${ORE_CAP:-150}
      BASE_MINE_TIME_SEC: ${BASE_MINE_TIME_SEC:-30}
      SPAWN_INTERVAL_SEC: ${SPAWN_INTERVAL_SEC:-60}
      CAVE_MIN_HOLD: ${CAVE_MIN_HOLD:-100}   # M5: $HASHROCK a wallet must hold to enter the cave zone
      FORGE_MIN_HOLD: ${FORGE_MIN_HOLD:-500} # M5: higher VIP gate for the forge zone
      GARDEN_MIN_HOLD: ${GARDEN_MIN_HOLD:-1000} # M5: premium VIP gate for the garden zone
      SOLVENCY_INTERVAL_MIN: ${SOLVENCY_INTERVAL_MIN:-10} # 1:1-backing reconciliation cadence (minutes)
      SOLVENCY_WEBHOOK_URL: ${SOLVENCY_WEBHOOK_URL:-}     # optional incoming webhook for solvency alerts
      SOLVENCY_TOL: ${SOLVENCY_TOL:-1}                    # allowed on-chain-above-DB dust before alerting
      SOLANA_RPC: ${SOLANA_RPC:?set SOLANA_RPC in .env}
      SOLANA_CLUSTER: ${SOLANA_CLUSTER:-devnet}
      # MUST match the on-chain mint (devnet legacy = 0, mainnet $HASHROCK = 6). initChain()
      # hard-fails on mismatch, so a forgotten/wrong value safely refuses to boot.
      TOKEN_DECIMALS: ${TOKEN_DECIMALS:-0}
      HASHROCK_MINT: ${HASHROCK_MINT:?set HASHROCK_MINT in .env}
      TREASURY_ADDRESS: ${TREASURY_ADDRESS:?set TREASURY_ADDRESS in .env}
      TREASURY_SECRET_PATH: /run/treasury/.treasury.json
    volumes:
      # treasury secret is mounted read-only at runtime — NEVER baked into the image or git
      - ./server/.treasury.json:/run/treasury/.treasury.json:ro
    # Health probe via Node (no curl/wget in the image): a NEW process hits /health, so it still runs
    # even if the main event loop is hung — catching the "running but not accepting connections" state
    # that took the API down. autoheal (below) restarts the container when this goes unhealthy.
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:2567/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 20s
      timeout: 8s
      retries: 3
      start_period: 45s
    labels:
      - autoheal=true

  # Watches containers labelled autoheal=true and restarts any that Docker marks unhealthy. Docker's
  # own restart policy only fires on process EXIT, not on a hung-but-running process — this covers that.
  autoheal:
    image: willfarrell/autoheal:latest
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 15        # check unhealthy containers every 15s
      AUTOHEAL_START_PERIOD: 60    # grace before the first check
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_SERVER_URL: wss://${API_DOMAIN:?set API_DOMAIN in .env}
    restart: unless-stopped
    depends_on:
      - server
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
      API_DOMAIN: ${API_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
